name: Update filter rules

# Runs on GitHub's servers (no local machine needed). Refreshes the filter
# rules from upstream and, only if they actually changed, commits the rebuilt
# extension, publishes a GitHub release, and uploads to the Chrome Web Store
# and Firefox AMO.
on:
  schedule:
    - cron: '0 3 * * 1'        # every Monday at 03:00 UTC
  workflow_dispatch: {}        # also runnable manually from the Actions tab

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump patch version
        id: bump
        run: python scripts/bump_version.py

      - name: Build extension (downloads latest filter lists)
        run: python scripts/build.py

      - name: Detect ruleset changes
        id: changes
        run: |
          if git diff --quiet -- src/rulesets/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No ruleset changes since last run."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Filter rules changed; will release v${{ steps.bump.outputs.version }}."
          fi

      - name: Revert version bump if nothing changed
        if: steps.changes.outputs.changed == 'false'
        run: git checkout -- .

      - name: Package release artifacts
        if: steps.changes.outputs.changed == 'true'
        run: |
          V="${{ steps.bump.outputs.version }}"
          ( cd dist/chrome && zip -qr "../../just-ad-blocker-chrome-v${V}.zip" . -x '_metadata/*' )
          cp dist/firefox.xpi "just-ad-blocker-v${V}.xpi"

      - name: Commit rebuilt extension
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "chore: refresh filter rules to v${{ steps.bump.outputs.version }} [skip ci]"
          git push

      - name: Publish release
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ steps.bump.outputs.version }}"
          gh release create "v${V}" \
            "just-ad-blocker-chrome-v${V}.zip" \
            "just-ad-blocker-v${V}.xpi" \
            --title "Just Ad Blocker v${V}" \
            --notes "Automated filter-rule refresh. Core/China rulesets recompiled from the latest AdGuard DNS filter, EasyList and AdRules."

      # --- Store publishing -------------------------------------------------
      # Secrets are configured under repo Settings -> Secrets and variables ->
      # Actions. The workflow only references them by name; the values never
      # appear in logs (Actions masks secret values automatically).

      - name: Publish to Chrome Web Store
        if: steps.changes.outputs.changed == 'true'
        run: |
          npx --yes chrome-webstore-upload-cli@3 upload \
            --source "just-ad-blocker-chrome-v${{ steps.bump.outputs.version }}.zip" \
            --extension-id "${{ secrets.CWS_EXTENSION_ID }}" \
            --client-id "${{ secrets.CWS_CLIENT_ID }}" \
            --client-secret "${{ secrets.CWS_CLIENT_SECRET }}" \
            --refresh-token "${{ secrets.CWS_REFRESH_TOKEN }}" \
            --auto-publish

      - name: Publish to Firefox AMO
        if: steps.changes.outputs.changed == 'true'
        run: |
          npx --yes web-ext@latest sign \
            --channel listed \
            --source-dir dist/firefox \
            --api-key "${{ secrets.AMO_JWT_ISSUER }}" \
            --api-secret "${{ secrets.AMO_JWT_SECRET }}"
